<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHANGI · Play with your food</title>

  <!-- Google Fonts: Assistant -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --shangi-pink:    #EE4D8B;
      --shangi-sky:     #29B9E7;
      --shangi-navy:    #2B4EA0;
      --shangi-orange:  #F7941D;

      --tint-blueprint: #C9E5F1;

      --ink:      #1A1A2E;
      --ink-2:    #3D3D52;
      --ink-3:    #6B7280;
      --rule:     #E8DFC9;

      --page-bg:   #FFFFFF;
      --card-sky:  #DDF2FB;
      --card-pink: #FBDDE9;
      --card-lilac:#E5DDF5;
      --card-peach:#FDE2CF;

      --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      background: #EDEFF2;
      color: var(--ink);
      font-family: 'Assistant', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ============= FRAME ============= */
    .frame {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--page-bg);
      min-height: 100vh;
      box-shadow: 0 0 0 1px var(--rule);
      overflow: hidden;
      position: relative;
      padding-bottom: 80px;
    }

    /* ============= MASTHEAD ============= */
    .masthead {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 14px 14px 12px;
      background: var(--page-bg);
      position: sticky; top: 0; z-index: 50;
    }
    .nav-left  { justify-self: start; display: flex; gap: 4px; }
    .nav-right { justify-self: end;   display: flex; gap: 4px; }
    .brand { justify-self: center; display: block; text-decoration: none; }
    .brand img {
      height: 147px; width: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }
    .icon-btn {
      background: transparent; border: 0; cursor: pointer; color: var(--ink);
      width: 38px; height: 38px;
      display: grid; place-items: center;
      border-radius: 50%;
      position: relative;
    }
    .icon-btn:active { background: #f3f3f5; }
    .cart-dot {
      position: absolute;
      top: 4px; left: 4px;
      background: var(--shangi-pink);
      color: white;
      font: 700 9.5px/1 'Assistant', sans-serif;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: grid; place-items: center;
      border: 2px solid white;
    }

    /* ============= HERO ============= */
    .hero {
      position: relative;
      margin: 0 14px;
      border-radius: 28px;
      overflow: hidden;
      aspect-ratio: 3 / 4.1;
      background: var(--tint-blueprint);
    }
    .hero .bg { position: absolute; inset: 0; overflow: hidden; }
    .hero .bg .slide {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      filter: contrast(1.06) saturate(1.08);
      transition: opacity 1.4s ease-in-out;
    }
    .hero .bg .slide.active { opacity: 1; }
    .hero .bg .slide.s1 { background-image: url('Sand_1.JPG'); }
    .hero .bg .slide.s2 { background-image: url('Pasta2.JPG'); }
    .hero .bg .slide.s3 { background-image: url('photo-donuts.jpg'); }
    .hero .scrim {
      position: absolute; inset: 0;
      background:
        radial-gradient(120% 80% at 20% 25%, rgba(255,255,255,0.30), transparent 65%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0) 35%, rgba(0,0,0,0.10));
    }
    .hero .content {
      position: absolute; inset: 0;
      padding: 28px 24px 24px;
      display: flex; flex-direction: column;
      justify-content: space-between;
      direction: ltr;
      text-align: left;
    }
    .hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 100px;
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--shangi-pink);
      text-shadow:
        0 0 22px rgba(255,255,255,0.55),
        0 1px 0 rgba(255,255,255,0.5),
        0 6px 18px rgba(43,43,64,0.20);
    }
    .hero h1 span { display: block; }
    .hero h1 span + span { margin-top: 0.04em; }

    /* ============= SECTION HEAD ============= */
    .sec-head {
      padding: 28px 18px 18px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .sec-pill {
      display: inline-flex; align-items: center; gap: 10px;
      background: white;
      border: 1px solid var(--rule);
      box-shadow: 0 4px 14px rgba(43,78,160,0.06);
      padding: 10px 18px 10px 14px;
      border-radius: 999px;
    }
    .sec-pill .gift {
      width: 28px; height: 28px;
      background: var(--card-peach);
      border-radius: 50%;
      display: grid; place-items: center;
      flex: none;
    }
    .sec-pill h2 {
      font-family: 'Assistant', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: var(--ink);
      line-height: 1;
      margin: 0;
    }
    .sec-link {
      font: 600 12.5px/1 'Assistant', sans-serif;
      color: var(--shangi-sky);
      text-decoration: none;
      white-space: nowrap;
    }

    /* ============= PRODUCT GRID ============= */
    .grid {
      padding: 4px 14px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .product {
      position: relative;
      background: white;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(43,78,160,0.06);
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      cursor: pointer;
    }
    .product .photo {
      position: relative;
      aspect-ratio: 1 / 1.05;
      overflow: hidden;
    }
    .product.tone-sky   .photo { background: var(--card-sky); }
    .product.tone-pink  .photo { background: var(--card-pink); }
    .product.tone-lilac .photo { background: var(--card-lilac); }
    .product .photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 12px; right: 12px;
      font-family: 'Assistant', sans-serif;
      font-weight: 600;
      font-size: 11.5px;
      padding: 5px 12px;
      border-radius: 999px;
      color: white;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    }
    .badge.sale { background: var(--shangi-orange); }
    .badge.new  { background: var(--shangi-pink); }

    .fav {
      position: absolute;
      top: 12px; left: 12px;
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.9);
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      display: grid; place-items: center;
      color: var(--ink-3);
    }
    .fav.on { color: var(--shangi-pink); }

    .product .info {
      padding: 14px 14px 16px;
      display: flex; flex-direction: column; gap: 6px;
      text-align: right;
    }
    .product .stars {
      direction: ltr;
      color: var(--shangi-orange);
      letter-spacing: -0.5px;
      font-size: 12px;
      display: flex; justify-content: flex-end; gap: 1px;
    }
    .product .name {
      font-family: 'Assistant', sans-serif;
      font-weight: 600;
      font-size: 14.5px;
      color: var(--ink);
      line-height: 1.15;
    }
    .product .age {
      font: 400 11.5px/1 'Assistant', sans-serif;
      color: var(--ink-3);
    }
    .product .price-row {
      display: flex; align-items: baseline; gap: 8px;
      margin-top: 4px;
    }
    .product .price {
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--shangi-pink);
    }

    /* ============= TAB BAR ============= */
    .tabbar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--rule);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 8px 0 12px;
      z-index: 60;
    }
    .tab {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: transparent; border: 0; cursor: pointer;
      color: var(--ink-3);
      font-family: 'Assistant', sans-serif;
      font-weight: 500;
      font-size: 10.5px;
      padding: 4px;
    }
    .tab.active { color: var(--shangi-pink); }

    /* ============= DETAIL VIEW ============= */
    .view.hidden { display: none; }

    .detail-bar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule);
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; border: 0; cursor: pointer;
      color: var(--ink);
      font-family: 'Assistant', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 6px 4px;
    }
    .back-btn svg { width: 18px; height: 18px; stroke: var(--ink); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .back-btn:hover { color: var(--shangi-pink); }
    .back-btn:hover svg { stroke: var(--shangi-pink); }
    .detail-bar .bar-mark {
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .gallery {
      position: relative;
      margin: 14px 14px 0;
      border-radius: 22px;
      overflow: hidden;
      background: var(--card-sky);
    }
    .gallery-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .gallery-track::-webkit-scrollbar { display: none; }
    .gallery-slide {
      flex: 0 0 100%;
      aspect-ratio: 1 / 1.05;
      scroll-snap-align: start;
      background: var(--tint-blueprint);
    }
    .gallery-slide img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-dots {
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 6px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.9);
      border-radius: 999px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .gallery-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--rule);
      transition: background 160ms var(--ease-soft), width 160ms var(--ease-soft);
    }
    .gallery-dots span.active {
      background: var(--ink);
      width: 18px;
      border-radius: 999px;
    }

    .detail-body { padding: 22px 18px 24px; text-align: right; }
    .detail-kicker {
      font: 600 11px/1 'Assistant', sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--shangi-navy);
    }
    .detail-title {
      margin-top: 10px;
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: 26px;
      line-height: 1.15;
      color: var(--ink);
    }
    .detail-desc {
      margin-top: 14px;
      font-family: 'Assistant', sans-serif;
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--ink-2);
    }
    .detail-meta {
      margin-top: 20px;
      padding: 14px 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: space-between;
    }
    .detail-price {
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: var(--shangi-pink);
    }
    .detail-pieces { text-align: left; }
    .detail-pieces .pc-num {
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--ink);
    }
    .detail-pieces .pc-label {
      display: block;
      margin-top: 2px;
      font: 500 10.5px/1 'Assistant', sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .purchase-btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      background: var(--ink);
      color: white;
      border: 0;
      border-radius: 999px;
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,0.16);
      transition: background 200ms var(--ease-soft), transform 200ms var(--ease-soft);
    }
    .purchase-btn:hover { background: var(--shangi-pink); transform: translateY(-1px); }
    .purchase-btn:active { transform: translateY(0); }
    .detail-note {
      margin-top: 12px;
      text-align: center;
      font: 500 11.5px/1.4 'Assistant', sans-serif;
      color: var(--ink-3);
    }
  </style>
</head>
<body>

<div class="frame">

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="nav-left">
      <button class="icon-btn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="13" x2="20" y2="13"/><line x1="4" y1="19" x2="14" y2="19"/></svg>
      </button>
      <button class="icon-btn" aria-label="Search">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <a href="#" class="brand" aria-label="SHANGI">
      <img src="the_new_logo.jpg" alt="SHANGI" />
    </a>
    <div class="nav-right">
      <button class="icon-btn" aria-label="Cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-dot">3</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="heroSection">
    <div class="bg">
      <div class="slide s1 active"></div>
      <div class="slide s2"></div>
      <div class="slide s3"></div>
    </div>
    <div class="scrim"></div>
    <div class="content">
      <h1>
        <span>Play</span>
        <span>with</span>
        <span>your</span>
        <span>food</span>
      </h1>
    </div>
  </section>

  <!-- SECTION HEAD -->
  <div class="sec-head" id="secHead">
    <div class="sec-pill">
      <span class="gift" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F7941D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
      </span>
      <h2>הערכות שלנו</h2>
    </div>
    <a href="#all" class="sec-link">כל המוצרים ←</a>
  </div>

  <!-- PRODUCT GRID -->
  <div class="grid" id="grid">

    <a class="product tone-sky" href="#" data-id="sandwich">
      <div class="photo">
        <img src="Sand_1.JPG" alt="ערכת כריכים" />
        <span class="badge new">חדש</span>
        <button class="fav" aria-label="favorite" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('on')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.5-9-9a5 5 0 019-3 5 5 0 019 3c-2 4.5-9 9-9 9z"/></svg>
        </button>
      </div>
      <div class="info">
        <div class="stars">★★★★★</div>
        <div class="name">ערכת כריכים</div>
        <div class="age">28 חלקים</div>
        <div class="price-row"><span class="price">₪69</span></div>
      </div>
    </a>

    <a class="product tone-pink" href="#" data-id="pasta">
      <div class="photo">
        <img src="Pasta2.JPG" alt="ערכת פסטה" />
        <span class="badge sale">מבצע</span>
        <button class="fav on" aria-label="favorite" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('on')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.6"><path d="M12 21s-7-4.5-9-9a5 5 0 019-3 5 5 0 019 3c-2 4.5-9 9-9 9z"/></svg>
        </button>
      </div>
      <div class="info">
        <div class="stars">★★★★★</div>
        <div class="name">ערכת פסטה</div>
        <div class="age">49 חלקים</div>
        <div class="price-row"><span class="price">₪69</span></div>
      </div>
    </a>

    <a class="product tone-lilac" href="#" data-id="donuts" style="grid-column: 1 / -1;">
      <div class="photo" style="aspect-ratio: 2 / 1.1;">
        <img src="photo-donuts.jpg" alt="מארז דונאטס" />
        <span class="badge new">חדש</span>
        <button class="fav" aria-label="favorite" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('on')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.5-9-9a5 5 0 019-3 5 5 0 019 3c-2 4.5-9 9-9 9z"/></svg>
        </button>
      </div>
      <div class="info">
        <div class="stars">★★★★★</div>
        <div class="name">מארז דונאטס</div>
        <div class="age">6 דונאטס · 8 ציפויים</div>
        <div class="price-row"><span class="price">₪230</span></div>
      </div>
    </a>

  </div>

  <!-- PRODUCT DETAIL VIEW -->
  <section class="view hidden" id="detailView" aria-hidden="true">
    <div class="detail-bar">
      <button class="back-btn" id="backBtn" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 6 15 12 9 18"></polyline></svg>
        <span>חזרה</span>
      </button>
      <span class="bar-mark">SHANGI</span>
    </div>

    <div class="gallery">
      <div class="gallery-track" id="galleryTrack"></div>
      <div class="gallery-dots" id="galleryDots"></div>
    </div>

    <div class="detail-body">
      <div class="detail-kicker">Hand-rolled · Felt</div>
      <h1 class="detail-title" id="dTitle"></h1>
      <p class="detail-desc" id="dDesc"></p>

      <div class="detail-meta">
        <div class="detail-price" id="dPrice"></div>
        <div class="detail-pieces">
          <span class="pc-num" id="dPieces"></span>
          <span class="pc-label">חלקים בערכה</span>
        </div>
      </div>

      <a href="#" class="purchase-btn">הוסיפי לסל · Purchase</a>
      <p class="detail-note">משלוח חינם בהזמנה מעל ₪200</p>
    </div>
  </section>

  <!-- TAB BAR -->
  <nav class="tabbar">
    <button class="tab active" aria-label="Home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      בית
    </button>
    <button class="tab" aria-label="Shop">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 8h16l-1 12H5L4 8z"/><path d="M9 8a3 3 0 016 0"/></svg>
      חנות
    </button>
    <button class="tab" aria-label="Favorites">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 21s-7-4.5-9-9a5 5 0 019-3 5 5 0 019 3c-2 4.5-9 9-9 9z"/></svg>
      מועדפים
    </button>
    <button class="tab" aria-label="Account">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
      אישי
    </button>
  </nav>

</div>

<script>
(function(){
  /* Hero slideshow */
  var slides = document.querySelectorAll('.hero .bg .slide');
  if (slides.length >= 2) {
    var i = 0;
    setInterval(function(){
      slides[i].classList.remove('active');
      i = (i + 1) % slides.length;
      slides[i].classList.add('active');
    }, 7000);
  }

  /* Product data — uses only the 3 product photos you provided */
  var PRODUCTS = {
    sandwich: {
      title: 'ערכת כריכים',
      desc:  'תנו לילדים להכין את הכריכים האהובים עליהם והחלק הטוב, אין פירורים. בערכה ישנם סוגי לחם שונים, ירקות ומיני ממרחים.',
      price: '₪69',
      pieces: '28',
      images: ['Sand_1.JPG']
    },
    pasta: {
      title: 'ערכת פסטה',
      desc:  'כל ילד או ילדה ירגישו כמו שף של מסעדה ממש כמו באיטליה. הערכה מכילה סוגי שונים של פסטות, רטבים ומיני תוספות.',
      price: '₪69',
      pieces: '49',
      images: ['Pasta2.JPG']
    },
    donuts: {
      title: 'מארז דונאטס',
      desc:  'המארז מכיל 4 דונאטס וניל, 2 דונאטס שוקולד, 8 ציפויים שונים. תנו לילדים ליהנות ממשחק סוציו־דרמטי.',
      price: '₪230',
      pieces: '14',
      images: ['photo-donuts.jpg']
    }
  };

  var detailView = document.getElementById('detailView');
  var mainEls = [
    document.querySelector('.masthead'),
    document.getElementById('heroSection'),
    document.getElementById('secHead'),
    document.getElementById('grid')
  ];
  var dTitle  = document.getElementById('dTitle');
  var dDesc   = document.getElementById('dDesc');
  var dPrice  = document.getElementById('dPrice');
  var dPieces = document.getElementById('dPieces');
  var track   = document.getElementById('galleryTrack');
  var dots    = document.getElementById('galleryDots');

  function openDetail(id){
    var p = PRODUCTS[id]; if (!p) return;
    dTitle.textContent  = p.title;
    dDesc.textContent   = p.desc;
    dPrice.textContent  = p.price;
    dPieces.textContent = p.pieces;

    track.innerHTML = p.images.map(function(src){
      return '<div class="gallery-slide"><img src="' + src + '" alt="' + p.title + '" /></div>';
    }).join('');
    dots.innerHTML = p.images.map(function(_, i){
      return '<span class="' + (i === 0 ? 'active' : '') + '"></span>';
    }).join('');
    track.scrollLeft = 0;

    mainEls.forEach(function(el){ if (el) el.style.display = 'none'; });
    detailView.classList.remove('hidden');
    detailView.setAttribute('aria-hidden', 'false');
    window.scrollTo({ top: 0 });

    track.onscroll = function(){
      var w   = track.clientWidth;
      var idx = Math.round(Math.abs(track.scrollLeft) / w);
      [].slice.call(dots.children).forEach(function(d, i){
        d.classList.toggle('active', i === idx);
      });
    };
  }

  function closeDetail(){
    detailView.classList.add('hidden');
    detailView.setAttribute('aria-hidden', 'true');
    mainEls.forEach(function(el){ if (el) el.style.display = ''; });
    window.scrollTo({ top: 0 });
  }

  document.getElementById('grid').addEventListener('click', function(e){
    var card = e.target.closest('.product');
    if (!card) return;
    e.preventDefault();
    openDetail(card.getAttribute('data-id'));
  });

  document.getElementById('backBtn').addEventListener('click', closeDetail);

  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && !detailView.classList.contains('hidden')) closeDetail();
  });
})();
</script>
</body>
</html>
